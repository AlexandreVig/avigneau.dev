<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- XP-style mail/envelope icon -->
  <!-- Envelope body -->
  <rect x="4" y="10" width="40" height="28" rx="2" fill="#ffffff" stroke="#999" stroke-width="1"/>
  <!-- Flap -->
  <polygon points="4,10 24,28 44,10" fill="#cce0ff" stroke="#999" stroke-width="1"/>
  <!-- Flap crease lines -->
  <line x1="4" y1="38" x2="20" y2="24" stroke="#999" stroke-width="1"/>
  <line x1="44" y1="38" x2="28" y2="24" stroke="#999" stroke-width="1"/>
</svg>
