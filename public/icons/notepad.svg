<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- XP-style notepad icon -->
  <!-- Page -->
  <rect x="6" y="4" width="36" height="42" rx="2" fill="#ffffff" stroke="#999" stroke-width="1"/>
  <!-- Lines -->
  <line x1="10" y1="14" x2="38" y2="14" stroke="#c0c0c0" stroke-width="1.5"/>
  <line x1="10" y1="20" x2="38" y2="20" stroke="#c0c0c0" stroke-width="1.5"/>
  <line x1="10" y1="26" x2="38" y2="26" stroke="#c0c0c0" stroke-width="1.5"/>
  <line x1="10" y1="32" x2="38" y2="32" stroke="#c0c0c0" stroke-width="1.5"/>
  <line x1="10" y1="38" x2="38" y2="38" stroke="#c0c0c0" stroke-width="1.5"/>
  <!-- Left binding line -->
  <line x1="14" y1="4" x2="14" y2="46" stroke="#aad4ff" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="6" y="4" width="36" height="8" rx="2" fill="#316ac5"/>
  <rect x="6" y="8" width="36" height="4" fill="#316ac5"/>
</svg>
